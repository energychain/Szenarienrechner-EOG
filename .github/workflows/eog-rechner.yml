name: EOG Rechner

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run typecheck
      - run: npm run build:release
      - run: npm run test:distribution
      - run: npm run test:docs
      - uses: actions/upload-artifact@v4
        with:
          name: szenarienrechner-eog-html
          path: dist/szenarienrechner-eog.html

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:release
      - run: npm run test:distribution
      - run: npm run test:docs
      - run: sha256sum dist/szenarienrechner-eog.html > SHA256SUMS.txt
      - run: |
          {
            echo "Szenarienrechner-EOG ${GITHUB_REF_NAME}"
            echo
            echo "Offline-Artefakt: dist/szenarienrechner-eog.html"
            echo
            echo "SHA-256:"
            cat SHA256SUMS.txt
            echo
            echo "Verifikation:"
            echo "sha256sum szenarienrechner-eog.html"
          } > RELEASE_NOTES.md
      - run: gh release create "$GITHUB_REF_NAME" dist/szenarienrechner-eog.html dist/release-manifest.json SHA256SUMS.txt --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ github.token }}
